<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="naver-site-verification" content="6c21c2e1c62b21dca1567472683a558c85b89925" />
    <title>플래피 버드 게임</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #87CEEB;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 30px;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .comment-area {
            flex-shrink: 0;
        }

        canvas {
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            border: 3px solid #333;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .game-info {
            margin-top: 15px;
            text-align: center;
            font-size: 18px;
            color: #333;
        }

        .score {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .instructions {
            font-size: 14px;
            color: #555;
        }

        .comment-area {
            width: 280px;
            background-color: transparent;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 100vh;
            padding: 0;
            border: none;
        }

        .comment-header {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
            text-align: left;
        }

        .comment-area livere-comment {
            width: 100%;
            min-height: 200px;
        }

        .input-group {
            margin-bottom: 8px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            color: #333;
            margin-bottom: 3px;
            font-weight: bold;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: 'Arial', sans-serif;
            font-size: 12px;
        }

        .input-group textarea {
            resize: vertical;
            min-height: 50px;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #87CEEB;
        }

        .submit-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 10px;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #45a049;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .comments-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .comment-item {
            background-color: transparent;
            padding: 8px 0;
            margin-bottom: 8px;
            border-bottom: 1px solid #ddd;
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-nickname {
            font-weight: bold;
            color: #333;
            margin-bottom: 2px;
            font-size: 12px;
        }

        .comment-content {
            color: #555;
            font-size: 11px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .comment-time {
            font-size: 10px;
            color: #999;
            margin-top: 3px;
        }

        .empty-message {
            text-align: center;
            color: #999;
            font-size: 11px;
            padding: 10px 0;
        }

        /* 스크롤바 스타일 */
        .comments-list::-webkit-scrollbar {
            width: 5px;
        }

        .comments-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .comments-list::-webkit-scrollbar-thumb {
            background: #87CEEB;
            border-radius: 5px;
        }

        .comments-list::-webkit-scrollbar-thumb:hover {
            background: #5eb3d9;
        }

        #disqus_thread {
            min-height: 360px;
        }

        .title-label {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            line-height: 1.4;
            z-index: 1000;
        }

        @media (max-width: 900px) {
            body {
                overflow-y: auto;
            }

            .container {
                flex-direction: column;
                height: auto;
                padding: 20px 16px 40px;
                align-items: center;
            }

            .title-label {
                position: static;
                text-align: center;
                margin-bottom: 16px;
                left: auto;
                top: auto;
            }

            .game-area {
                width: 100%;
                max-width: 420px;
            }

            canvas {
                width: min(90vw, 400px);
                height: auto;
                max-height: 75vh;
            }

            .game-info {
                margin-top: 12px;
                font-size: 16px;
            }

            .comment-area {
                width: 100%;
                max-width: 420px;
                margin-top: 16px;
            }

            .comment-header {
                font-size: 15px;
                margin-bottom: 10px;
            }

            .input-group label {
                font-size: 12px;
            }

            .input-group input,
            .input-group textarea {
                font-size: 13px;
            }

            .submit-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="title-label">
        Flappy Bird<br>
        kg.woo22
    </div>
    <div class="container">
        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="600"></canvas>
            <div class="game-info">
                <div class="score">점수: <span id="score">0</span></div>
                <div class="instructions">SPACE 또는 CLICK 으로 점프</div>
            </div>
        </div>

        <div class="comment-area">
            <livere-comment client-id="l7Cl7StLE47lr3I7MA4J"></livere-comment>
        </div>

    </div>
    <script type="module" src="https://www.livere.org/livere-widget.js"></script>

    <script>
        // 게임 변수
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const bird = {
            x: 50,
            y: canvas.height / 2,
            width: 30,
            height: 30,
            dy: 0,
            gravity: 0.15,
            jumpPower: -5
        }; 

        let pipes = [];
        let score = 0;
        let gameOver = false;
        let gameStarted = false;
        const pipeGap = 300;
        const pipeWidth = 70;
        const pipeDistance = 200;

        // 게임 시작 이벤트
        function startGame() {
            if (!gameStarted) {
                gameStarted = true;
                gameOver = false;
                score = 0;
                pipes = [];
                bird.y = canvas.height / 2;
                bird.dy = 0;
                document.getElementById('score').textContent = score;
                gameLoop();
            }
        }

        // 새 점프
        function jump() {
            if (!gameStarted) {
                startGame();
            }
            if (!gameOver) {
                bird.dy = bird.jumpPower;
            }
        }

        // 파이프 생성
        function createPipe() {
            const minHeight = 50;
            const maxHeight = canvas.height - pipeGap - minHeight;
            const pipeY = Math.random() * (maxHeight - minHeight) + minHeight;

            pipes.push({
                x: canvas.width,
                y: pipeY,
                width: pipeWidth,
                gapStart: pipeY,
                gapEnd: pipeY + pipeGap,
                scored: false
            });
        }

        // 충돌 감지
        function checkCollision(pipe) {
            if (bird.x + bird.width > pipe.x && bird.x < pipe.x + pipe.width) {
                if (bird.y < pipe.gapStart || bird.y + bird.height > pipe.gapEnd) {
                    return true;
                }
            }
            return false;
        }

        // 게임 루프
        function gameLoop() {
            // 화면 지우기
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 중력 적용
            bird.dy += bird.gravity;
            bird.y += bird.dy;

            // 천장, 바닥 충돌
            if (bird.y < 0 || bird.y + bird.height > canvas.height) {
                gameOver = true;
            }

            // 새 그리기
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(bird.x + bird.width / 2, bird.y + bird.height / 2, bird.width / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#FFA500';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 눈 그리기
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(bird.x + 18, bird.y + 12, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(bird.x + 18, bird.y + 12, 2, 0, Math.PI * 2);
            ctx.fill();

            // 파이프 생성
            if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - pipeDistance) {
                createPipe();
            }

            // 파이프 업데이트 및 그리기
            for (let i = 0; i < pipes.length; i++) {
                const pipe = pipes[i];
                pipe.x -= 2;

                // 파이프 그리기 (위)
                ctx.fillStyle = '#228B22';
                ctx.fillRect(pipe.x, 0, pipe.width, pipe.gapStart);

                // 파이프 그리기 (아래)
                ctx.fillRect(pipe.x, pipe.gapEnd, pipe.width, canvas.height - pipe.gapEnd);

                // 파이프 테두리
                ctx.strokeStyle = '#1a6b1a';
                ctx.lineWidth = 2;
                ctx.strokeRect(pipe.x, 0, pipe.width, pipe.gapStart);
                ctx.strokeRect(pipe.x, pipe.gapEnd, pipe.width, canvas.height - pipe.gapEnd);

                // 충돌 감지
                if (checkCollision(pipe)) {
                    gameOver = true;
                }

                // 점수 증가
                if (pipe.x + pipe.width < bird.x && !pipe.scored) {
                    pipe.scored = true;
                    score++;
                    document.getElementById('score').textContent = score;
                }

                // 화면 밖의 파이프 제거
                if (pipe.x + pipe.width < 0) {
                    pipes.splice(i, 1);
                    i--;
                }
            }

            // 게임 오버 확인
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#FF0000';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);

                ctx.font = '20px Arial';
                ctx.fillText('점수: ' + score, canvas.width / 2, canvas.height / 2 + 30);
                ctx.fillText('SPACE를 눌러 다시 시작', canvas.width / 2, canvas.height / 2 + 70);

                gameStarted = false;
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        // 이벤트 리스너
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });

        canvas.addEventListener('click', jump);

        // 페이지 로드 시 게임 시작
        window.addEventListener('load', () => {
            gameLoop();
        });
    </script>
</body>
</html>
